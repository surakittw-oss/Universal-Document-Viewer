<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Document Viewer</title>
    <!-- โหลด Tailwind CSS สำหรับตกแต่ง UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Libraries สำหรับเปิดไฟล์ .docx -->
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/docx-preview/dist/docx-preview.min.js"></script>
    <!-- โหลด Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ซ่อน Scrollbar ของ Container แต่ยัง Scroll ได้ */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <!-- แถบเมนูด้านบน -->
    <header class="bg-blue-600 text-white shadow-md py-4 px-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <i data-lucide="file-text" class="w-6 h-6"></i>
            <h1 class="text-xl font-bold">Universal Document Viewer</h1>
        </div>
        <p class="text-sm opacity-80 hidden md:block">ไม่ต้องง้อโปรแกรม ก็เปิดไฟล์ได้</p>
    </header>

    <main class="max-w-[1400px] w-full mx-auto p-4 md:p-6 flex flex-col md:flex-row gap-6 h-[calc(100vh-80px)]">
        
        <!-- แถบด้านข้าง: ส่วนอัปโหลดไฟล์ (ปรับให้เล็กลง) -->
        <div class="w-full md:w-72 lg:w-80 flex flex-col gap-4 flex-shrink-0">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 text-center">
                <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.doc,.pages" />
                <div id="dropZone" class="border-2 border-dashed border-blue-300 rounded-lg p-6 cursor-pointer hover:bg-blue-50 transition-colors flex flex-col items-center justify-center" onclick="document.getElementById('fileInput').click()">
                    <div class="bg-blue-100 p-3 rounded-full text-blue-600 mb-3">
                        <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-700">คลิกเลือกไฟล์<br/>หรือลากมาวางที่นี่</p>
                        <p class="text-xs text-gray-500 mt-2">รองรับ: .pdf, .docx</p>
                    </div>
                </div>
            </div>
            
            <!-- กล่องข้อความแจ้งเตือน -->
            <div id="messageBox" class="p-4 rounded-lg hidden text-left shadow-sm"></div>
        </div>

        <!-- พื้นที่แสดงผลเอกสาร (ย้ายมาอยู่ด้านขวาและขยายเต็มพื้นที่) -->
        <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-full min-h-[500px]">
            <div class="bg-gray-100 border-b border-gray-200 px-4 py-3 flex justify-between items-center">
                <h2 class="font-semibold text-gray-700 flex items-center gap-2 text-sm md:text-base">
                    <i data-lucide="monitor" class="w-4 h-4"></i>
                    พื้นที่แสดงผล (Preview)
                </h2>
                <span id="fileNameDisplay" class="text-xs md:text-sm text-gray-500 font-medium truncate max-w-[200px] md:max-w-xs">ยังไม่ได้เลือกไฟล์</span>
            </div>
            
            <!-- Container สำหรับแสดงเนื้อหา -->
            <div id="viewerContainer" class="flex-1 w-full bg-gray-200 relative overflow-auto no-scrollbar flex items-center justify-center">
                <div class="text-gray-400 flex flex-col items-center gap-2">
                    <i data-lucide="file-question" class="w-10 h-10"></i>
                    <p class="text-sm">เอกสารของคุณจะแสดงที่นี่</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // ทำการ Render Icons
        lucide.createIcons();

        const fileInput = document.getElementById('fileInput');
        const viewerContainer = document.getElementById('viewerContainer');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const messageBox = document.getElementById('messageBox');

        // ฟังก์ชันแสดงข้อความแจ้งเตือน
        function showMessage(type, text) {
            messageBox.className = `p-4 rounded-lg text-left text-sm font-medium shadow-sm ${
                type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 
                type === 'info' ? 'bg-blue-50 text-blue-700 border border-blue-200' : 
                'bg-green-50 text-green-700 border border-green-200'
            }`;
            messageBox.innerHTML = text;
            messageBox.classList.remove('hidden');
        }

        function hideMessage() {
            messageBox.classList.add('hidden');
        }

        // จัดการเมื่อมีการเลือกไฟล์
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            hideMessage();
            fileNameDisplay.textContent = file.name;
            viewerContainer.innerHTML = '<div class="animate-pulse text-gray-500">กำลังประมวลผลเอกสาร...</div>';

            const extension = file.name.split('.').pop().toLowerCase();

            // 1. จัดการไฟล์ PDF
            if (extension === 'pdf') {
                // สร้าง Object URL จากไฟล์ เพื่อให้ Browser เปิด PDF ได้โดยตรง
                // วิธีนี้ดีที่สุดเพราะ Browser จะแสดง Comment/Annotation ของ PDF ได้อย่างสมบูรณ์
                const fileURL = URL.createObjectURL(file);
                viewerContainer.innerHTML = `<iframe src="${fileURL}" class="w-full h-full border-none"></iframe>`;
                showMessage('success', '<i data-lucide="check-circle" class="w-4 h-4 inline mr-1"></i> เปิดไฟล์ PDF สำเร็จ คุณสามารถดูคอมเมนต์ในเอกสารได้เลย');
                lucide.createIcons();
            } 
            
            // 2. จัดการไฟล์ .docx
            else if (extension === 'docx') {
                viewerContainer.innerHTML = '<div id="docx-container" class="w-full min-h-full bg-white p-8"></div>';
                const docxContainer = document.getElementById('docx-container');
                
                // ใช้ docx-preview render ไฟล์
                docx.renderAsync(file, docxContainer)
                    .then(() => {
                        showMessage('info', '<i data-lucide="info" class="w-4 h-4 inline mr-1"></i> เปิดไฟล์ .docx สำเร็จ<br/><span class="text-xs font-normal opacity-70 mt-1 block">*รูปแบบและการจัดหน้าอาจไม่เหมือนต้นฉบับ 100% เนื่องจากเป็นการดึงข้อมูลเบื้องต้นมาแสดงผลบนหน้าเว็บ</span>');
                        lucide.createIcons();
                    })
                    .catch((err) => {
                        viewerContainer.innerHTML = '';
                        showMessage('error', 'เกิดข้อผิดพลาดในการเปิดไฟล์ Word: ' + err.message);
                    });
            } 
            
            // 3. จัดการไฟล์ที่ไม่รองรับ (.pages, .doc)
            else if (extension === 'pages' || extension === 'doc') {
                viewerContainer.innerHTML = `
                    <div class="text-center text-red-500">
                        <i data-lucide="alert-triangle" class="w-16 h-16 mx-auto mb-2 opacity-50"></i>
                        <p class="text-lg font-bold">ไม่รองรับไฟล์สกุลนี้บน Web Browser</p>
                    </div>`;
                
                let advice = extension === 'pages' 
                    ? 'ไฟล์ <b>.pages</b> เป็นระบบปิดของ Apple ไม่สามารถเปิดบนเว็บโดยตรงได้ แนะนำให้ลูกค้า Export เป็น PDF หรือ Word ก่อนส่งครับ'
                    : 'ไฟล์ <b>.doc</b> เป็นไฟล์ Word รุ่นเก่ามาก (ก่อนปี 2007) ระบบรองรับเฉพาะ .docx ครับ แนะนำให้ Save As เป็น .docx หรือ PDF ครับ';
                
                showMessage('error', advice);
                lucide.createIcons();
            } 
            
            // อื่นๆ
            else {
                viewerContainer.innerHTML = '';
                showMessage('error', 'กรุณาอัปโหลดไฟล์นามสกุล .pdf หรือ .docx เท่านั้นครับ');
            }
        });

        // รองรับการลากไฟล์มาวาง (Drag & Drop)
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-blue-50', 'border-blue-500');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-500');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-500');
            
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                // กระตุ้นให้เกิด event change
                const event = new Event('change');
                fileInput.dispatchEvent(event);
            }
        });
    </script>
</body>
</html>
