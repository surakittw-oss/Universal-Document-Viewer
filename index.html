<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Document Viewer</title>
    <!-- โหลด Tailwind CSS สำหรับตกแต่ง UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ซ่อน Scrollbar ของ Container แต่ยัง Scroll ได้ */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <!-- แถบเมนูด้านบน -->
    <header class="bg-blue-600 text-white shadow-md py-4 px-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <i data-lucide="file-text" class="w-6 h-6"></i>
            <h1 class="text-xl font-bold">Universal Document Viewer</h1>
        </div>
        <p class="text-sm opacity-80 hidden md:block">แสดงผลเอกสารแม่นยำ 100% (Powered by Google)</p>
    </header>

    <main class="max-w-[1400px] w-full mx-auto p-4 md:p-6 flex flex-col md:flex-row gap-6 h-[calc(100vh-80px)]">
        
        <!-- แถบด้านข้าง: ส่วนอัปโหลดไฟล์ -->
        <div class="w-full md:w-72 lg:w-80 flex flex-col gap-4 flex-shrink-0">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 text-center">
                <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.doc,.pages" />
                <div id="dropZone" class="border-2 border-dashed border-blue-300 rounded-lg p-6 cursor-pointer hover:bg-blue-50 transition-colors flex flex-col items-center justify-center" onclick="document.getElementById('fileInput').click()">
                    <div class="bg-blue-100 p-3 rounded-full text-blue-600 mb-3">
                        <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-700">คลิกเลือกไฟล์<br/>หรือลากมาวางที่นี่</p>
                        <p class="text-xs text-gray-500 mt-2">รองรับ: .pdf, .docx</p>
                    </div>
                </div>
            </div>
            
            <!-- กล่องข้อความแจ้งเตือน -->
            <div id="messageBox" class="p-4 rounded-lg hidden text-left shadow-sm"></div>
        </div>

        <!-- พื้นที่แสดงผลเอกสาร -->
        <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-full min-h-[500px]">
            <div class="bg-gray-100 border-b border-gray-200 px-4 py-3 flex justify-between items-center">
                <h2 class="font-semibold text-gray-700 flex items-center gap-2 text-sm md:text-base">
                    <i data-lucide="monitor" class="w-4 h-4"></i>
                    พื้นที่แสดงผล (Preview)
                </h2>
                <span id="fileNameDisplay" class="text-xs md:text-sm text-gray-500 font-medium truncate max-w-[200px] md:max-w-xs">ยังไม่ได้เลือกไฟล์</span>
            </div>
            
            <!-- Container สำหรับแสดงเนื้อหา -->
            <div id="viewerContainer" class="flex-1 w-full bg-gray-200 relative overflow-auto no-scrollbar flex items-center justify-center">
                <div class="text-gray-400 flex flex-col items-center gap-2">
                    <i data-lucide="file-question" class="w-10 h-10"></i>
                    <p class="text-sm">เอกสารของคุณจะแสดงที่นี่</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // ทำการ Render Icons
        lucide.createIcons();

        const fileInput = document.getElementById('fileInput');
        const viewerContainer = document.getElementById('viewerContainer');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const messageBox = document.getElementById('messageBox');

        // ฟังก์ชันแสดงข้อความแจ้งเตือน
        function showMessage(type, text) {
            messageBox.className = `p-4 rounded-lg text-left text-sm font-medium shadow-sm ${
                type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 
                type === 'info' ? 'bg-blue-50 text-blue-700 border border-blue-200' : 
                'bg-green-50 text-green-700 border border-green-200'
            }`;
            messageBox.innerHTML = text;
            messageBox.classList.remove('hidden');
        }

        function hideMessage() {
            messageBox.classList.add('hidden');
        }

        // จัดการเมื่อมีการเลือกไฟล์
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            hideMessage();
            fileNameDisplay.textContent = file.name;
            
            const extension = file.name.split('.').pop().toLowerCase();

            // 1. จัดการไฟล์ PDF (เปิดบน Browser ได้เลย)
            if (extension === 'pdf') {
                viewerContainer.innerHTML = '<div class="animate-pulse text-gray-500">กำลังประมวลผล PDF...</div>';
                const fileURL = URL.createObjectURL(file);
                viewerContainer.innerHTML = `<iframe src="${fileURL}" class="w-full h-full border-none"></iframe>`;
                showMessage('success', '<i data-lucide="check-circle" class="w-4 h-4 inline mr-1"></i> เปิดไฟล์ PDF สำเร็จ คุณสามารถดูคอมเมนต์ได้');
                lucide.createIcons();
            } 
            
            // 2. จัดการไฟล์ .docx (ส่งไปแปลงที่ Google Apps Script)
            else if (extension === 'docx') {
                viewerContainer.innerHTML = `
                    <div class="animate-pulse text-blue-500 flex flex-col items-center gap-3">
                        <i data-lucide="loader-2" class="w-10 h-10 animate-spin"></i>
                        <p class="font-medium">กำลังส่งไฟล์ให้ Google ประมวลผล...</p>
                        <p class="text-xs text-gray-500">(อาจใช้เวลา 5-10 วินาที ขึ้นอยู่กับขนาดไฟล์)</p>
                    </div>`;
                lucide.createIcons();

                // *** สำคัญ: นำ URL ที่ได้จาก Google Apps Script มาใส่ในเครื่องหมายคำพูดด้านล่างนี้ ***
                const GOOGLE_SCRIPT_URL = 'https://script.google.com/a/macros/thestandard.co/s/AKfycbxHY5VLqgesv9xf2OTHs914FpxHrEfbEIglhjXlWvhvm4YC-tfOnqShyH5wevDkvbqY/exec';

                if(GOOGLE_SCRIPT_URL === 'https://script.google.com/a/macros/thestandard.co/s/AKfycbxHY5VLqgesv9xf2OTHs914FpxHrEfbEIglhjXlWvhvm4YC-tfOnqShyH5wevDkvbqY/exec') {
                     viewerContainer.innerHTML = `
                        <div class="text-center text-amber-500 max-w-md">
                            <i data-lucide="alert-circle" class="w-16 h-16 mx-auto mb-2 opacity-50"></i>
                            <p class="text-lg font-bold">รอการตั้งค่า URL</p>
                            <p class="text-sm mt-2">กรุณานำ URL ของ Google Apps Script มาใส่ในโค้ด (บรรทัดที่ 113) เพื่อให้ระบบทำงานได้ครับ</p>
                        </div>`;
                    showMessage('info', 'กรุณาตั้งค่า Google Apps Script ก่อนใช้งานฟังก์ชัน Word');
                    lucide.createIcons();
                    return;
                }

                // อ่านไฟล์เป็น Base64
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result.split(',')[1];
                    
                    const formData = new FormData();
                    formData.append('fileData', base64Data);
                    formData.append('fileName', file.name);
                    formData.append('mimeType', file.type || 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');

                    // ส่งไปให้ Google Apps Script แปลงไฟล์
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(result => {
                        if (result.status === 'success') {
                            // นำ Base64 PDF ที่ได้กลับมาแปลงเพื่อเปิดใน iframe
                            const pdfData = atob(result.pdfData);
                            const pdfArray = new Uint8Array(pdfData.length);
                            for (let i = 0; i < pdfData.length; i++) {
                                pdfArray[i] = pdfData.charCodeAt(i);
                            }
                            const pdfBlob = new Blob([pdfArray], { type: 'application/pdf' });
                            const pdfUrl = URL.createObjectURL(pdfBlob);
                            
                            viewerContainer.innerHTML = `<iframe src="${pdfUrl}#toolbar=0" class="w-full h-full border-none"></iframe>`;
                            showMessage('success', '<i data-lucide="check-circle" class="w-4 h-4 inline mr-1"></i> แปลงและแสดงผลด้วย Google Engine สำเร็จ รูปแบบเหมือนต้นฉบับ 100%!');
                        } else {
                            throw new Error(result.message);
                        }
                        lucide.createIcons();
                    })
                    .catch(error => {
                        viewerContainer.innerHTML = `
                            <div class="text-center text-red-500 max-w-md">
                                <i data-lucide="x-circle" class="w-16 h-16 mx-auto mb-2 opacity-50"></i>
                                <p class="text-lg font-bold">การแปลงไฟล์ล้มเหลว</p>
                                <p class="text-sm mt-2">${error.message}</p>
                            </div>`;
                        showMessage('error', 'ข้อผิดพลาด: โปรดตรวจสอบ URL ของ Google Script และการตั้งค่าสิทธิ์ให้เป็น Anyone (ทุกคน)');
                        lucide.createIcons();
                    });
                };
                reader.readAsDataURL(file);
            } 
            
            // 3. จัดการไฟล์ที่ไม่รองรับ (.pages, .doc)
            else if (extension === 'pages' || extension === 'doc') {
                viewerContainer.innerHTML = `
                    <div class="text-center text-red-500">
                        <i data-lucide="alert-triangle" class="w-16 h-16 mx-auto mb-2 opacity-50"></i>
                        <p class="text-lg font-bold">ไม่รองรับไฟล์สกุลนี้</p>
                    </div>`;
                
                let advice = extension === 'pages' 
                    ? 'ไฟล์ <b>.pages</b> ไม่สามารถแปลงได้ แนะนำให้ลูกค้า Export เป็น PDF หรือ Word (.docx) ก่อนส่งครับ'
                    : 'ไฟล์ <b>.doc</b> เป็นไฟล์รุ่นเก่ามาก แนะนำให้ Save As เป็น .docx ก่อนครับ';
                
                showMessage('error', advice);
                lucide.createIcons();
            } 
            
            // อื่นๆ
            else {
                viewerContainer.innerHTML = '';
                showMessage('error', 'กรุณาอัปโหลดไฟล์นามสกุล .pdf หรือ .docx เท่านั้นครับ');
            }
        });

        // รองรับการลากไฟล์มาวาง (Drag & Drop)
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-blue-50', 'border-blue-500');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-500');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-500');
            
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                const event = new Event('change');
                fileInput.dispatchEvent(event);
            }
        });
    </script>
</body>
</html>
